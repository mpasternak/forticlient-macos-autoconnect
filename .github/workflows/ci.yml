name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  applescript-syntax:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated tools are in sync with src/
        run: ./build.sh --check
      - name: Syntax-check AppleScript files
        run: |
          osacompile -o /tmp/forti.scptd forti.scpt
          osacompile -o /tmp/forti-disconnect.scptd forti-disconnect.scpt
          osacompile -o /tmp/forti-status.scptd forti-status.scpt

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck forti-debug.scpt, build.sh, release.sh and test suite
        run: shellcheck --shell=bash build.sh forti-debug.scpt release.sh tests/*.sh
