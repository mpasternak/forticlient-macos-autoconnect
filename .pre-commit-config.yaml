repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--shell=bash]
        files: forti-debug\.scpt$
        # forti-debug.scpt is bash despite the extension; without this
        # override the hook's default `types: [shell]` never matches it
        types: [file]
      - id: shellcheck
        args: [--shell=bash]
        files: ^(release\.sh|tests/.*\.sh)$
